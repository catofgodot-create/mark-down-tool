name: Deploy MarkItDown container
# Production deployment is intentionally limited to pushes on main and manual runs.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "service/**"
      - "cloudflare-container/**"
      - "wrangler.container.jsonc"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-container.yml"

permissions:
  contents: read

concurrency:
  group: markitdown-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deployment dependencies
        run: npm ci

      - name: Validate Python service
        run: python -m py_compile service/app.py

      - name: Deploy Worker and container
        run: npx wrangler deploy --config wrangler.container.jsonc --containers-rollout=immediate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
